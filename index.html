<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almoxarifado - Controle de Estoque</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topo">
    <h1>Controle de Almoxarifado</h1>
    <p class="subtitulo">Sprint 3 — Dashboard e Publicação</p>
  </header>

  <main class="container">

    <section class="cartao dashboard">
      <h2>Dashboard</h2>
      <div class="dashboard-info">
        <span>Total de itens cadastrados: <strong id="total-itens">0</strong></span>
      </div>
    </section>

    <section class="cartao">
      <h2>Pesquisar Material</h2>
      <div class="campo">
        <label for="input-busca">Filtrar por nome</label>
        <input
          type="text"
          id="input-busca"
          placeholder="Ex: Seringa"
        />
      </div>
    </section>

    <section class="cartao">
      <h2>Cadastrar Material</h2>

      <div class="campo">
        <label for="input-nome">Nome do material</label>
        <input
          type="text"
          id="input-nome"
          placeholder="Ex: Seringa 10ml"
        />
      </div>

      <div class="campo">
        <label for="input-quantidade">Quantidade</label>
        <input
          type="number"
          id="input-quantidade"
          min="0"
          placeholder="Ex: 50"
        />
      </div>

      <button type="button" id="btn-cadastrar">Cadastrar</button>

      <p id="mensagem-status" class="mensagem"></p>
    </section>

  </main>

  <script src="main.js"></script>
</body>
</html>
